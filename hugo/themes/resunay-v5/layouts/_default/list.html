{{ define "main" }}
  <article>
    <h1 class="essay-title">{{ .Title }}</h1>
    {{ .Content }}
    <ul class="post-list">
      {{ range .Pages.ByDate.Reverse }}
        <li>
          <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          <span class="post-date">{{ .Date.Format "Jan 2006" }}</span>
        </li>
      {{ end }}
    </ul>
  </article>
{{ end }}
