# go-task tasks for the resunay v5 static site.
# Run inside the dev container (Task is installed in the image): `task <name>`.
# `task` with no args lists available tasks.

version: '3'

vars:
  PROJECT: resunay-v5
  HUGO_DIR: hugo         # Hugo source; builds into PUBLIC_DIR via publishDir=../public
  PUBLIC_DIR: public
  PREVIEW_PORT: 8919
  BRANCH: main          # Cloudflare Pages production branch — deploys on it go live

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  build:
    desc: "Build the site with Hugo from {{.HUGO_DIR}}/ into {{.PUBLIC_DIR}}/ (publishDir=../public)"
    cmds:
      # Hugo writes into {{.PUBLIC_DIR}}/ (set via publishDir in hugo/hugo.toml),
      # so `push` — which uploads {{.PUBLIC_DIR}}/ — stays unchanged.
      # --cleanDestinationDir prunes stale output (e.g. after a post is renamed),
      # since Hugo's build is otherwise additive and never deletes old files.
      - hugo --source {{.HUGO_DIR}} --minify --cleanDestinationDir

  dev:
    desc: "Hugo dev server on port {{.PREVIEW_PORT}} with LiveReload (fast edit loop)"
    cmds:
      # Hugo renders from memory and injects LiveReload; watches content, layouts,
      # and static/ — so homepage + blog both hot-reload from one command.
      - hugo server --source {{.HUGO_DIR}} --bind 0.0.0.0 --port {{.PREVIEW_PORT}}

  preview:
    desc: "Build, then serve {{.PUBLIC_DIR}}/ on port {{.PREVIEW_PORT}} — Pages-faithful (no auto-reload; final checks)"
    deps: [build]
    cmds:
      - wrangler pages dev {{.PUBLIC_DIR}} --ip 0.0.0.0 --port {{.PREVIEW_PORT}}

  create:
    desc: "Create the Cloudflare Pages project (one-time; sets the production branch)"
    cmds:
      - wrangler pages project create {{.PROJECT}} --production-branch {{.BRANCH}}

  push:
    desc: "Deploy {{.PUBLIC_DIR}}/ to Cloudflare Pages PRODUCTION ({{.PROJECT}}) — needs .env token"
    deps: [build]
    cmds:
      # --branch matches the production branch, so this is a PRODUCTION deploy
      # (we use local `task preview`, not Cloudflare preview deployments).
      - wrangler pages deploy {{.PUBLIC_DIR}} --project-name {{.PROJECT}} --branch {{.BRANCH}}

  whoami:
    desc: Check Cloudflare auth / token is working
    cmds:
      - wrangler whoami
